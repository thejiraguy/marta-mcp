name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          pyproject=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$manifest" ] || [ "$tag" != "$pyproject" ]; then
            echo "Tag v$tag does not match manifest.json ($manifest) or pyproject.toml ($pyproject)" >&2
            exit 1
          fi

      - name: Build .mcpb / .dxt bundles
        run: bash scripts/build_dxt.sh

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/marta-mcp.mcpb dist/marta-mcp.dxt \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
